name: resonance
description: A high-performance music player with EQ, amplifier, and downloader.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio Engine
  just_audio: ^0.9.40
  audio_service: ^0.18.13
  audio_session: ^0.1.21

  # Downloader
  youtube_explode_dart: ^2.3.3
  dio: ^5.7.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # File scanning (make songs visible to other apps)
  # flutter_media_metadata: ^1.0.0+1

  # State Management
  get: ^4.6.6

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/