name: resonance
description: A high-performance music player with EQ, amplifier, and downloader.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.46
  audio_service: ^0.18.13
  audio_session: ^0.1.21
  youtube_explode_dart: ^2.5.3   # Stable, audioOnly API intact  
  dio: ^5.7.0
  path_provider: ^2.1.4
  permission_handler: ^11.4.0
  get: ^4.6.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/